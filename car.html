<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BorsodTaxi - Autó Részletek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="car-detail"></div>
    <script src="app.js"></script>
    <script>
        const neptun = getNeptun();

        if (!neptun) {
            window.location.href = 'index.html';
        }

        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');

        if (!id) {
            alert("Nincs autó kiválasztva.");
            window.location.href = 'cars.html';
        }

        getCarDetails(neptun, id).then(car => {
            document.getElementById('car-detail').innerHTML = `
    <div class="car-detail-header">
        <h1>${car.brand} ${car.model}</h1>
        <span class="car-id">#${car.id}</span>
    </div>
    <div class="car-detail-grid">
        <div class="car-detail-item">
            <span class="car-detail-label">Tulajdonos</span>
            <span class="car-detail-value">${car.owner}</span>
        </div>
        <div class="car-detail-item">
            <span class="car-detail-label">Üzembe helyezés</span>
            <span class="car-detail-value">${car.dayOfCommission}</span>
        </div>
        <div class="car-detail-item">
            <span class="car-detail-label">Fogyasztás</span>
            <span class="car-detail-value">${car.electric ? '— (elektromos)' : car.fuelUse + ' L/100km'}</span>
        </div>
        <div class="car-detail-item">
            <span class="car-detail-label">Hajtás</span>
            <span class="car-detail-value ${car.electric ? 'badge-electric' : 'badge-fuel'}">${car.electric ? '⚡ Elektromos' : '⛽ Benzin/Dízel'}</span>
        </div>
    </div>
    <a class="btn" href="cars.html">← Vissza</a>
`;

        })
    </script>
</body>
</html>

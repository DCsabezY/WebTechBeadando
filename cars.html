<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BorsodTaxi - Autók</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-content">
        <div class="page-header">
            <h1>Autók</h1>
            <span class="page-header-sub">Flotta járművei</span>
        </div>
        <div id="cars-list"></div>
    </div>

    <script src="app.js"></script>
    <script>
        const neptun = getNeptun();

        if (!neptun) {
            window.location.href = 'index.html';
        }

        getCars(neptun).then(cars => {
            const list = document.getElementById('cars-list');

            for (const car of cars) {
                list.innerHTML += `
                    <div class="cars-card">
                        <div class="cars-card-header">
                            <span class="cars-card-id">#${car.id}</span>
                            <h2>${car.owner}</h2>
                        </div>
                        <p class="cars-card-model">${car.brand} ${car.model}</p>
                        <div class="cars-card-footer">
                            <span class="cars-card-fuel">${car.electric ? '⚡ Elektromos' : car.fuelUse.toFixed(1) + ' L/100km'}</span>
                            <a href="car.html?id=${car.id}" class="btn btn-sm">Részletek →</a>
                        </div>
                    </div>
                `;
            }
        }).catch(err => {
            console.error(err);
            alert('Hiba történt az autók betöltésekor. Kérjük, próbáld újra!');
        });
    </script>
</body>
</html>

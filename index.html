<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BorsodTaxi - Főoldal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <p class="login-title">Üdvözöllek a BorsodTaxi alkalmazásában!</p>
        <div class="login-card">
            <h1><img src="taxi-svgrepo-com.svg" class="brand-svg">BorsodTaxi</h1>
            <p>Add meg a neptun kódodat a folytatáshoz!</p>
            <input type="text" id="neptun-input" placeholder="Neptun kód" maxlength="6">
            <button id="login-btn">Belépés</button>
        </div>
    </div>
    <script src="app.js"></script>
    <script>
    if(getNeptun()) {
        window.location.href = "cars.html";
    }
    document.getElementById("login-btn").addEventListener("click", function() {
        const code = document.getElementById('neptun-input').value.trim();

        if (!code || !/^[A-Za-z0-9]{6}$/.test(code)) {
            alert('Érvénytelen Neptun kód! (6 alfanumerikus karakter)');
            return;
        }

        setNeptun(code);
        window.location.href = 'cars.html';
    }); 
    </script>
</body>
</html>

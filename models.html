<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BorsodTaxi - Modellek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="page-content">
        <div class="page-header">
            <h1>Autómodellek</h1>
            <span class="page-header-sub">Elérhető modellek márkánként</span>
        </div>

        <div class="form-card">
            <input type="text" id="brand-input" placeholder="Autómárka (pl. Toyota)">
            <button id="search-btn" class="btn">Keresés</button>
        </div>

        <div id="result-container"></div>
    </div>

    <script src="app.js"></script>
    <script>
        const SUPPORTED_BRANDS = ["Toyota", "Honda", "Ford", "Chevrolet", "Nissan", "BMW", "Mercedes-Benz", "Volkswagen"];

        document.getElementById('search-btn').addEventListener('click', function () {
            const brand = document.getElementById('brand-input').value.trim();
            const container = document.getElementById('result-container');
            container.innerHTML = '';

            if (!brand) {
                container.innerHTML = '<p class="error-msg">Kérjük, add meg az autómárkát!</p>';
                return;
            }

            const matched = SUPPORTED_BRANDS.find(b => b.toLowerCase() === brand.toLowerCase());

            if (!matched) {
                container.innerHTML = `<p class="error-msg">A(z) "${brand}" márka nem támogatott. Támogatott márkák: ${SUPPORTED_BRANDS.join(', ')}</p>`;
                return;
            }

            getAvailableModels(matched)
                .then(data => {
                    if (!Array.isArray(data)) {
                        container.innerHTML = `<p class="error-msg">${data.message || 'Ismeretlen hiba.'}</p>`;
                        return;
                    }

                    if (data.length === 0) {
                        container.innerHTML = '<p>Nincs elérhető modell ehhez a márkához.</p>';
                        return;
                    }

                    let html = `<h2>${matched} modelljei</h2><ul class="models-list">`;
                    data.forEach(model => {
                        html += `<li>${model}</li>`;
                    });
                    html += '</ul>';
                    container.innerHTML = html;
                })
                .catch(err => {
                    console.error(err);
                    container.innerHTML = '<p class="error-msg">Hiba történt a modellek lekérésekor. Próbáld újra!</p>';
                });
        });
    </script>
</body>
</html>
